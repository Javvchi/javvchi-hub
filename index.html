<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javvchi | Social Hub</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-color: #e63946; /* Rojo Nero */
            --text-color: #f1f1f1;
            --secondary-text: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* Foto de Perfil */
        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.3);
            object-fit: cover;
        }

        h1 { font-size: 1.5rem; margin: 10px 0 5px; letter-spacing: 1px; }
        .bio { color: var(--secondary-text); font-size: 0.9rem; margin-bottom: 20px; }

        /* Botón de Stream (Destacado) */
        .live-btn {
            background: linear-gradient(45deg, #00e701, #00ab01); /* Color Kick */
            color: black;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 231, 1, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(0, 231, 1, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 231, 1, 0); }
        }

        /* Contenedor de Enlaces */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: all 0.3s ease;
            display: block;
        }

        .link-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
            background-color: #252525;
        }

        .discord-info {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--secondary-text);
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/150" alt="Javvchi" class="profile-pic">
        <h1>JAVVCHI</h1>
        <p class="bio">Streaming Diario @ 8:00 PM | Gaming & Anime</p>
    </div>

    <div class="links-container">
        <a href="https://kick.com/javvchi" class="link-card live-btn" target="_blank">
            📺 VER EN VIVO (KICK)
        </a>

        <a href="https://www.tiktok.com/@tu_usuario" class="link-card" target="_blank">
            🎬 TikTok (Clips & Anime)
        </a>

        <a href="#" class="link-card">
            ⚔️ Mobile Legends ID: [Tu ID Aquí]
        </a>

        <a href="#" class="link-card">
            💰 Apoyar el Stream (Binance/BAC)
        </a>
    </div>

    <div class="discord-info">
        Comunidad en Discord: <strong>rodriguezjavi9075</strong>
    </div>

</body>
</html>
